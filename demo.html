<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Credit - Demo Hero</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #ffffff; color: #1a1a1a; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 3rem; position: relative; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo img { height: 40px; }
    .header-right { display: flex; align-items: center; gap: 2rem; }
    .phone {
      display: flex; align-items: center; gap: 0.5rem;
      color: #7b2d8e; font-weight: 600; font-size: 0.95rem; text-decoration: none;
    }
    .login-link { color: #7b2d8e; font-weight: 700; font-size: 0.9rem; text-decoration: none; text-transform: uppercase; letter-spacing: 0.05em; }
    .menu-btn { display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .menu-btn span { width: 28px; height: 2.5px; background: #1a1a1a; border-radius: 2px; }

    .hero { display: grid; grid-template-columns: 55% 45%; min-height: calc(100vh - 80px); position: relative; }
    .hero-left { padding: 2rem 3rem 3rem; display: flex; flex-direction: column; justify-content: center; }
    .hero-title { font-size: 2.2rem; font-weight: 900; line-height: 1.2; color: #2d8a3e; margin-bottom: 2.5rem; text-transform: uppercase; }
    .hero-title span { font-weight: 400; }

    .calculator {
      background: #ffffff; border-radius: 16px 0 0 16px; padding: 2rem 2.5rem;
      box-shadow: 0 4px 30px rgba(0,0,0,0.06); flex: 1;
    }
    .calc-question { font-size: 1.3rem; color: #6b7280; margin-bottom: 1.5rem; }
    .calc-question strong { color: #7b2d8e; font-weight: 700; }

    .slider-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .slider-btn {
      width: 40px; height: 40px; border: 2px solid #7b2d8e; background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.3rem; color: #7b2d8e; transition: all 0.2s; flex-shrink: 0; font-weight: 600;
    }
    .slider-btn:hover { background: #7b2d8e; color: #fff; }

    .slider-track-wrapper { flex: 1; position: relative; height: 50px; display: flex; align-items: center; }
    .slider-track-bg {
      position: absolute; left: 0; right: 0; height: 8px; background: #e5e7eb;
      border-radius: 4px; top: 50%; transform: translateY(-50%);
    }
    .slider-track-fill {
      position: absolute; left: 0; height: 8px; background: #7b2d8e;
      border-radius: 4px; top: 50%; transform: translateY(-50%); pointer-events: none;
    }
    .range-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 8px; background: transparent; outline: none;
      cursor: pointer; position: relative; z-index: 3; margin: 0;
    }
    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 24px; height: 24px; border-radius: 50%;
      background: #7b2d8e; cursor: grab; border: 3px solid #fff;
      box-shadow: 0 2px 6px rgba(123,45,142,0.3);
      position: relative; z-index: 4;
    }
    .range-slider::-webkit-slider-thumb:active { cursor: grabbing; }
    .range-slider::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%;
      background: #7b2d8e; cursor: grab; border: 3px solid #fff;
      box-shadow: 0 2px 6px rgba(123,45,142,0.3);
    }

    .slider-value-box {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      display: flex; align-items: center; gap: 0.5rem;
      background: #fff; border: 2px solid #7b2d8e; border-radius: 8px;
      padding: 0.4rem 0.8rem; font-weight: 700; font-size: 1.1rem; color: #7b2d8e;
      white-space: nowrap; cursor: grab; z-index: 5; user-select: none;
      min-width: 140px; justify-content: center;
      box-shadow: 0 2px 8px rgba(123, 45, 142, 0.15);
    }
    .slider-value-box .arrow {
      color: #7b2d8e; cursor: pointer; font-size: 1.3rem; font-weight: 700;
      line-height: 1; user-select: none; opacity: 0.7;
    }
    .slider-value-box .arrow:hover { opacity: 1; }

    .slider-range {
      display: flex; justify-content: space-between; font-size: 0.9rem; color: #9ca3af;
      margin-bottom: 1.5rem; padding: 0 48px;
    }

    .discount-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .discount-label { font-weight: 700; font-size: 0.85rem; color: #7b2d8e; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .discount-input {
      border: none; border-bottom: 1px solid #e5e7eb; padding: 0.4rem 0;
      font-size: 0.95rem; color: #9ca3af; outline: none; font-family: inherit; width: 120px;
    }

    .cta-btn {
      background: #c0392b; color: #fff; border: none; padding: 1rem 2.5rem; border-radius: 8px;
      font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.6rem; transition: background 0.2s;
    }
    .cta-btn:hover { background: #a93226; }

    .calc-row {
      display: flex; align-items: flex-start; gap: 0;
    }
    .loan-summary {
      background: rgba(255,255,255,0.97); border-radius: 0 12px 12px 0; padding: 1.5rem 2rem;
      min-width: 280px; z-index: 5; box-shadow: 4px 4px 24px rgba(0,0,0,0.08);
      margin-top: 0; align-self: stretch; display: flex; flex-direction: column; justify-content: center;
    }
    .summary-section-title {
      font-weight: 800; font-size: 0.85rem; color: #2d8a3e; text-transform: uppercase;
      letter-spacing: 0.08em; margin-top: 0.8rem; margin-bottom: 0.3rem;
    }
    .summary-section-title:first-child { margin-top: 0; }
    .summary-row { display: flex; justify-content: space-between; padding: 0.35rem 0; font-size: 0.95rem; }
    .summary-row .label { color: #6b7280; font-weight: 500; text-transform: uppercase; font-size: 0.85rem; }
    .summary-row .value { color: #6b7280; font-weight: 500; }
    .summary-row .value.green { color: #2d8a3e; font-weight: 700; }

    .hero-right { position: relative; overflow: hidden; }
    .hero-right img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-right::before {
      content: ''; position: absolute; top: 0; left: -1px;
      width: 80px; height: 100%; background: #ffffff;
      clip-path: polygon(0 0, 100% 0, 0 100%); z-index: 2;
    }

    .bottom-banner { text-align: center; padding: 2rem; background: #ffffff; }
    .bottom-banner h2 { font-size: 1.8rem; font-weight: 400; color: #2d8a3e; text-transform: uppercase; letter-spacing: 0.05em; }
    .bottom-banner h2 strong { font-weight: 900; font-style: italic; }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .hero-right { min-height: 300px; }
      .loan-summary { position: static; transform: none; margin-top: 1.5rem; }
      .header { padding: 1rem 1.5rem; }
      .hero-left { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="images/logo-cool-credit.dfbe1766.svg" alt="Cool Credit">
    </div>
    <div class="header-right">
      <a href="tel:226219946" class="phone">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        226 219 946
      </a>
      <a href="#" class="login-link">Přihlášení</a>
      <div class="menu-btn"><span></span><span></span><span></span></div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-left">
      <h1 class="hero-title">Nebankovní online půjčka <span>na vše,<br>co vás v životě potká</span></h1>
      <div class="calc-row">
        <div class="calculator">
          <p class="calc-question"><strong>Kolik peněz</strong> budete potřebovat?</p>
          <div class="slider-row">
            <button class="slider-btn" id="btnMinus">−</button>
            <div class="slider-track-wrapper" id="trackWrapper">
              <div class="slider-track-bg"></div>
              <div class="slider-track-fill" id="trackFill"></div>
              <input type="range" class="range-slider" id="amountSlider" min="1000" max="30000" step="100" value="15000">
              <div class="slider-value-box" id="valueBox">
                <span class="arrow">‹</span>
                <span id="amountDisplay">15 000 Kč</span>
                <span class="arrow">›</span>
              </div>
            </div>
            <button class="slider-btn" id="btnPlus">+</button>
          </div>
          <div class="slider-range"><span>od 1 000 Kč</span><span>do 30 000 Kč</span></div>
          <div class="discount-row">
            <span class="discount-label">Slevový kód</span>
            <input type="text" class="discount-input" placeholder="Zadejte">
          </div>
          <button class="cta-btn">Požádat →</button>
        </div>
        <div class="loan-summary" id="loanSummary">
          <div class="summary-section-title">Půjčka</div>
          <div class="summary-row"><span class="label">Peníze vám pošleme</span><span class="value">do 10 min</span></div>
          <div class="summary-row"><span class="label">RPSN</span><span class="value" id="summaryRpsn">3 091 %</span></div>
          <div class="summary-row"><span class="label">Poplatek</span><span class="value" id="summaryFee">3 750 Kč</span></div>
          <div class="summary-section-title" style="color: #2d8a3e;">Sleva</div>
          <div class="summary-row"><span class="label">Celkem zaplatíte</span><span class="value green" id="summaryTotal">18 750 Kč</span></div>
        </div>
      </div>
    </div>

    <div class="hero-right">
      <img src="images/hero.webp" alt="Žena se psem v přírodě">
    </div>
  </section>

  <div class="bottom-banner"><h2>Stačí opravdu <strong>málo</strong></h2></div>

  <script>
    const MIN = 1000, MAX = 30000, STEP = 100;
    const slider = document.getElementById('amountSlider');
    const trackFill = document.getElementById('trackFill');
    const valueBox = document.getElementById('valueBox');
    const amountDisplay = document.getElementById('amountDisplay');
    const summaryTotal = document.getElementById('summaryTotal');
    const summaryFee = document.getElementById('summaryFee');
    const trackWrapper = document.getElementById('trackWrapper');

    function formatCZK(val) { return val.toLocaleString('cs-CZ') + ' Kč'; }

    function update() {
      let amount = parseInt(slider.value);
      if (amount < MIN) { amount = MIN; slider.value = MIN; }
      if (amount > MAX) { amount = MAX; slider.value = MAX; }

      amountDisplay.textContent = formatCZK(amount);
      const pct = ((amount - MIN) / (MAX - MIN)) * 100;
      trackFill.style.width = pct + '%';

      // Position value box on the track
      const wrapperWidth = trackWrapper.offsetWidth;
      const boxWidth = valueBox.offsetWidth;
      const thumbPos = (pct / 100) * wrapperWidth;
      const clampedLeft = Math.max(boxWidth / 2, Math.min(thumbPos, wrapperWidth - boxWidth / 2));
      valueBox.style.left = clampedLeft + 'px';

      // Calculate loan
      const fee = Math.round(amount * 0.25);
      const total = amount + fee;
      summaryFee.textContent = formatCZK(fee);
      summaryTotal.textContent = formatCZK(total);
    }

    slider.addEventListener('input', update);
    document.getElementById('btnMinus').addEventListener('click', () => { slider.value = Math.max(MIN, parseInt(slider.value) - STEP); update(); });
    document.getElementById('btnPlus').addEventListener('click', () => { slider.value = Math.min(MAX, parseInt(slider.value) + STEP); update(); });

    // Make value box draggable - forward mouse events to range input
    let isDragging = false;
    valueBox.addEventListener('mousedown', (e) => {
      isDragging = true;
      e.preventDefault();
      updateFromMouse(e);
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      updateFromMouse(e);
    });
    document.addEventListener('mouseup', () => { isDragging = false; });

    // Touch support for value box drag
    valueBox.addEventListener('touchstart', (e) => {
      isDragging = true;
      updateFromTouch(e);
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      updateFromTouch(e);
    }, { passive: true });
    document.addEventListener('touchend', () => { isDragging = false; });

    function updateFromMouse(e) {
      const rect = trackWrapper.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const pct = x / rect.width;
      slider.value = Math.round((MIN + pct * (MAX - MIN)) / STEP) * STEP;
      update();
    }

    function updateFromTouch(e) {
      const touch = e.touches[0];
      const rect = trackWrapper.getBoundingClientRect();
      const x = Math.max(0, Math.min(touch.clientX - rect.left, rect.width));
      const pct = x / rect.width;
      slider.value = Math.round((MIN + pct * (MAX - MIN)) / STEP) * STEP;
      update();
    }

    update();
    window.addEventListener('resize', update);
  </script>
</body>
</html>
